<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Amend" />
<meta name="theme-color" content="#000000" />
<meta name="color-scheme" content="dark" />
<title>Amend - Your Daily Therapist</title>
<link rel="manifest" href="manifest.json" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --black:#000000;
  --green:#58BB80;
  --blue:#00558E;
  --white:#FFFFFF;
  --card:#121212;
  --card-border:#262626;
  --gray:#9a9a9a;
  --radius:14px;
  --danger:#d9534f;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--black);color:var(--white);font-family:'Inter',-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;overscroll-behavior:none;}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:90px;}
.screen{display:none;padding:24px 20px 40px;animation:fadein .25s ease;}
.screen.active{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){.screen{animation:none;}}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.wordmark{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.wordmark .dot{color:var(--green);}
.badge{font-size:11px;color:var(--gray);border:1px solid var(--card-border);padding:4px 10px;border-radius:20px;}
.badge.link{color:var(--green);border-color:var(--green);cursor:pointer;}

.eyebrow{font-size:12px;letter-spacing:1.5px;color:var(--green);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
h1.headline{font-size:30px;font-weight:800;line-height:1.15;margin:0 0 14px;letter-spacing:-0.5px;}
h1.headline .accent{color:var(--green);}
p.body{color:#cfcfcf;font-size:15px;line-height:1.6;margin:0 0 16px;}
p.sub{color:var(--gray);font-size:13px;line-height:1.5;margin:0 0 18px;}

.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.card.accent-left{border-left:3px solid var(--green);}
.card.accent-left.blue{border-left:3px solid var(--blue);}

.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:opacity .15s;}
.btn:active{opacity:.7;}
.btn-primary{background:var(--green);color:#06210f;}
.btn-secondary{background:transparent;color:var(--white);border:1px solid var(--card-border);}
.btn-text{background:none;border:none;color:var(--green);font-weight:600;font-size:14px;padding:8px 0;cursor:pointer;font-family:inherit;}
.btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn-row .btn{flex:1;}

input[type=text], input[type=email], input[type=password], textarea{
  width:100%;background:#0c0c0c;border:1px solid var(--card-border);color:var(--white);
  border-radius:10px;padding:13px 14px;font-size:15px;font-family:inherit;margin-bottom:14px;
}
textarea{resize:vertical;min-height:90px;}
label.field-label{font-size:13px;color:#ddd;font-weight:600;margin-bottom:6px;display:block;}
label.field-label .opt{color:var(--gray);font-weight:400;}

.progress-bar{height:4px;background:#222;border-radius:4px;overflow:hidden;margin:10px 0 4px;}
.progress-fill{height:100%;background:var(--green);transition:width .3s;}
.step-label{font-size:12px;color:var(--gray);margin-bottom:2px;}

.option-card{display:flex;align-items:flex-start;gap:12px;background:var(--card);border:1px solid var(--card-border);
  border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.option-card.selected{border-color:var(--green);}
.option-letter{flex:0 0 28px;width:28px;height:28px;border-radius:50%;border:1px solid var(--card-border);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#ccc;}
.option-card.selected .option-letter{background:var(--green);border-color:var(--green);color:#06210f;}
.option-text{font-size:14.5px;line-height:1.4;color:#eee;padding-top:3px;}

.pause-link{display:block;text-align:center;color:var(--gray);font-size:13px;margin-top:14px;}

.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.pill{border:1px solid var(--card-border);border-radius:20px;padding:8px 16px;font-size:13px;color:#ccc;cursor:pointer;}
.pill.selected{background:var(--green);color:#06210f;border-color:var(--green);font-weight:700;}

.reorder-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--card-border);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.reorder-arrows{display:flex;gap:6px;}
.arrow-btn{background:#1a1a1a;border:1px solid var(--card-border);color:#ccc;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:13px;}

.theme-num{position:absolute;right:14px;top:10px;font-size:46px;font-weight:800;color:#1e1e1e;}
.theme-card{position:relative;overflow:hidden;}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.chip{font-size:12px;border:1px solid var(--card-border);border-radius:14px;padding:5px 11px;color:#ccc;}

/* Tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#0a0a0a;
  border-top:1px solid var(--card-border);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--gray);background:none;border:none;font-family:inherit;}
.tab-item.active{color:var(--green);}
.tab-item svg{width:22px;height:22px;}
.tab-item span{font-size:11px;font-weight:600;}

/* Mood scale */
.mood-scale{display:flex;justify-content:space-between;gap:4px;margin:14px 0 6px;}
.mood-btn{flex:1;aspect-ratio:1;border-radius:50%;border:1px solid var(--card-border);background:#0c0c0c;
  color:#ccc;font-size:13px;font-weight:700;cursor:pointer;}
.mood-btn.selected{background:var(--green);color:#06210f;border-color:var(--green);}
.mood-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:18px;}

.safety-chip{position:fixed;bottom:96px;right:16px;background:var(--green);color:#06210f;font-weight:700;font-size:13px;
  padding:10px 16px;border-radius:30px;box-shadow:0 4px 14px rgba(0,0,0,.5);cursor:pointer;z-index:40;display:flex;align-items:center;gap:6px;}

.steps-list{margin:10px 0;padding-left:0;list-style:none;counter-reset:step;}
.steps-list li{counter-increment:step;padding-left:30px;position:relative;margin-bottom:10px;font-size:14px;color:#ddd;line-height:1.5;}
.steps-list li::before{content:counter(step);position:absolute;left:0;top:0;width:20px;height:20px;border-radius:50%;
  background:var(--card-border);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}

.duration-tag{display:inline-block;font-size:12px;color:var(--green);border:1px solid var(--green);border-radius:14px;padding:3px 10px;margin-bottom:10px;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-box{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;}
.stat-num{font-size:26px;font-weight:800;}
.stat-label{font-size:12px;color:var(--gray);margin-top:2px;}

.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;margin:10px 0;}
.bar{width:100%;background:#1c1c1c;border-radius:4px 4px 0 0;position:relative;}
.bar .fill{position:absolute;bottom:0;left:0;right:0;background:var(--green);border-radius:4px 4px 0 0;}
.bar-day{font-size:10px;color:var(--gray);text-align:center;margin-top:4px;}

.row-link{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--card-border);cursor:pointer;}
.row-link:last-child{border-bottom:none;}
.row-link .rl-title{font-size:14.5px;font-weight:600;}
.row-link .rl-sub{font-size:12.5px;color:var(--gray);margin-top:2px;}
.row-link .rl-action{font-size:13px;color:var(--green);font-weight:600;}

.toggle{position:relative;width:46px;height:26px;background:#222;border-radius:14px;cursor:pointer;flex:0 0 46px;}
.toggle.on{background:var(--green);}
.toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .15s;}
.toggle.on .knob{left:23px;}

.filter-chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;}
.filter-chips .chip{white-space:nowrap;cursor:pointer;}
.filter-chips .chip.active{background:var(--green);color:#06210f;border-color:var(--green);font-weight:700;}

.empty-state{text-align:center;padding:40px 20px;color:var(--gray);}
.empty-state .icon{font-size:32px;margin-bottom:10px;}
.empty-state p{font-size:14px;line-height:1.5;}

.entry-item{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:14px;margin-bottom:10px;}
.entry-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:6px;}
.entry-tag{color:var(--green);font-weight:700;text-transform:uppercase;font-size:10px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal-overlay.active{display:flex;}
.modal-sheet{background:#101010;border-radius:20px 20px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));
  width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#333;border-radius:4px;margin:0 auto 16px;}
.modal-close{position:absolute;top:18px;right:20px;background:none;border:none;color:var(--gray);font-size:20px;cursor:pointer;}

.coin{color:#e8c14a;font-weight:700;}
.disclaimer{font-size:11.5px;color:#777;line-height:1.5;margin-top:30px;padding-top:16px;border-top:1px solid var(--card-border);}

.notice-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:14px;margin-bottom:10px;}
.notice-date{font-size:11px;color:var(--green);font-weight:700;margin-bottom:4px;}
.notice-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.notice-body{font-size:13px;color:#ccc;line-height:1.45;margin-bottom:8px;}

::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet"></div>
</div>

<script src="content.js"></script>
<script src="app.js"></script>
</body>
</html>
